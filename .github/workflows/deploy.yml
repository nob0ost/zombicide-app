name: Deploy container to Yandex Cloud

on:
  push:
    branches: [ main ]

env:
  YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
  YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
  OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
  YC_REGISTRY_ID: crpc043hc46bmegqv1dm
  SA_ID: ajeuod68tba59drd26un

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ env.OAUTH_TOKEN }}

      - name: Extract application archive
        run: tar -xzf zombicide_v.2.tar.gz

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          docker build ./Zombicide2ndEdition -t "cr.yandex/${{ env.YC_REGISTRY_ID }}/zombicide-app:${IMAGE_TAG}"
          docker push "cr.yandex/${{ env.YC_REGISTRY_ID }}/zombicide-app:${IMAGE_TAG}"

  deploy_serverless:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_image_tag: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write service account key
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          mkdir -p .yc
          echo "$YC_SA_KEY_JSON" > .yc/sa-key.json

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${STATIC_KEY_ID}" \
            -backend-config="secret_key=${STATIC_KEY_SECRET}"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve

      - name: Terraform Destroy (on deploy failure)
        if: failure()
        run: terraform destroy -auto-approve
