name: Deploy container to Yandex Cloud

on:
  push:
    branches: [ main ]

env:
  YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
  YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
  OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
  YC_REGISTRY_ID: crpc043hc46bmegqv1dm

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ env.OAUTH_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          docker build ./Zombicide2ndEdition -t "cr.yandex/${{ env.YC_REGISTRY_ID }}/zombicide-app:${IMAGE_TAG}"
          docker push "cr.yandex/${{ env.YC_REGISTRY_ID }}/zombicide-app:${IMAGE_TAG}"

  deploy_serverless:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get YC IAM token
        id: iam
        run: |
          IAM_TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"yandexPassportOauthToken\":\"${OAUTH_TOKEN}\"}" \
            https://iam.api.cloud.yandex.net/iam/v1/tokens | jq -r '.iamToken')
          echo "YC_TOKEN=$IAM_TOKEN" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
        run: terraform apply -auto-approve -var="image_tag=${IMAGE_TAG}"
