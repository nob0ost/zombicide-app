stages:
  - build
  - deploy

variables:
  YC_CLOUD_ID: "$YC_CLOUD_ID"
  YC_FOLDER_ID: "$YC_FOLDER_ID"
  OAUTH_TOKEN: "$OAUTH_TOKEN"
  YC_REGISTRY_ID: "crpc043hc46bmegqv1dm"

build_and_push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build ./Zombicide2ndEdition -t "cr.yandex/$YC_REGISTRY_ID/zombicide-app:$IMAGE_TAG"
    - docker push "cr.yandex/$YC_REGISTRY_ID/zombicide-app:$IMAGE_TAG"
    - echo "IMAGE_TAG=$IMAGE_TAG" >> image.env
  artifacts:
    reports:
      dotenv: image.env

deploy_serverless:
  stage: deploy
  image: hashicorp/terraform:1.8.0
  needs:
    - job: build_and_push
      artifacts: true
  script:
    - export IAM_TOKEN=$(curl -s -X POST -d '{"yandexPassportOauthToken":"'${OAUTH_TOKEN}'"}' https://iam.api.cloud.yandex.net/iam/v1/tokens | jq -r '.iamToken')
    - terraform init
    - terraform apply -var="image_tag=$IMAGE_TAG"
